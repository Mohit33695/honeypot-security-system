<!DOCTYPE html>
<html>
<head>
  <title>Security Monitor</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

    body { background:#0f172a; color:white; padding:20px; }

    h2 { text-align:center; color:#38bdf8; }
    h3 { text-align:center; color:#ef4444; margin-bottom:10px; }

    #riskBox {
      text-align:center;
      font-size:22px;
      font-weight:bold;
      margin-bottom:10px;
      animation:pulse 1.5s infinite;
    }

    .ai-text {
      text-align:center;
      color:#94a3b8;
      margin-bottom:15px;
    }

    @keyframes pulse {
      0% {opacity:0.6;}
      50% {opacity:1;}
      100% {opacity:0.6;}
    }

    .card {
      background:#020617;
      padding:20px;
      border-radius:12px;
      border:1px solid #1e293b;
      margin-bottom:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    table { width:100%; border-collapse:collapse; }
    th { background:#1e293b; color:#38bdf8; padding:10px; }
    td { padding:10px; text-align:center; font-size:13px; }

    .table-container {
      max-height:300px;
      overflow-y:auto;
    }

    #alertBox {
      position:fixed;
      top:20px;
      right:20px;
      background:#ef4444;
      color:white;
      padding:15px;
      border-radius:10px;
      display:none;
      font-weight:bold;
      z-index:999;
    }
  </style>
</head>

<body>

<h2>🛡️ Security Operations Center</h2>
<h3>🔴 LIVE ATTACK MONITOR</h3>

<div id="riskBox">Risk Level: LOW</div>
<p class="ai-text">AI Insight: Monitoring attack patterns in real-time</p>

<div id="alertBox">🚨 AI ALERT: High Risk Attack!</div>

<!-- 🔊 AUDIO FIX -->
<audio id="alertSound" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

<div class="card">
  <canvas id="attackChart"></canvas>
</div>

<div class="card table-container">
  <table id="logTable">
    <tr>
      <th>Username</th>
      <th>Password</th>
      <th>Attack Type</th>
      <th>Time</th>
      <th>IP</th>
    </tr>
  </table>
</div>

<script>
let chart;
let audioReady = false;

// 🔊 Unlock audio on first click
document.addEventListener("click", () => {
  const audio = document.getElementById("alertSound");

  audio.play().then(() => {
    audio.pause();
    audio.currentTime = 0;
    audioReady = true;
    console.log("🔊 Audio unlocked");
  }).catch(() => {});
});

async function loadLogs() {

  let logs = [];
  try {
    const res = await fetch('/logs-db');
    logs = await res.json();
    if (!logs || logs.length === 0) throw "Empty DB";
  } catch {
    const res = await fetch('/logs');
    logs = await res.json();
  }

  const table = document.getElementById("logTable");

  table.innerHTML = `
    <tr>
      <th>Username</th>
      <th>Password</th>
      <th>Attack Type</th>
      <th>Time</th>
      <th>IP</th>
    </tr>
  `;

  let stats = {
    sql_injection: 0,
    brute_force: 0,
    xss: 0,
    suspicious_ip: 0,
    automation_tool: 0,
    bot_activity: 0
  };

  let totalRisk = 0;

  logs.slice().reverse().forEach(log => {
    const row = table.insertRow();

    row.insertCell(0).innerText = log.username;
    row.insertCell(1).innerText = log.password;
    row.insertCell(2).innerText = log.attackType;
    row.insertCell(3).innerText = log.time;
    row.insertCell(4).innerText = log.ip;

    if (stats[log.attackType] !== undefined) {
      stats[log.attackType]++;
    }

    totalRisk += log.riskScore || 0;

    if (log.attackType === "sql_injection") row.style.backgroundColor = "#7f1d1d";
    else if (log.attackType === "xss") row.style.backgroundColor = "#78350f";
    else if (log.attackType === "brute_force") row.style.backgroundColor = "#365314";
    else if (log.attackType === "suspicious_ip") row.style.backgroundColor = "#581c87";
  });

  let riskText = "LOW";
  let color = "#22c55e";

  if (totalRisk > 20) {
    riskText = "HIGH";
    color = "#ef4444";
  } else if (totalRisk > 10) {
    riskText = "MEDIUM";
    color = "#f59e0b";
  }

  const riskBox = document.getElementById("riskBox");
  riskBox.innerText = "Risk Level: " + riskText;
  riskBox.style.color = color;

  // 🚨 ALERT + SOUND
  if (riskText === "HIGH") {
    const alertBox = document.getElementById("alertBox");
    alertBox.style.display = "block";

    const audio = document.getElementById("alertSound");
    if (audioReady) {
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    setTimeout(() => {
      alertBox.style.display = "none";
    }, 3000);
  }

  updateChart(stats);
}

function updateChart(stats) {
  const data = {
    labels: [
      "SQL Injection",
      "Brute Force",
      "XSS",
      "Suspicious IP",
      "Automation Tool",
      "Bot Activity"
    ],
    datasets: [{
      label: "Attack Count",
      data: [
        stats.sql_injection,
        stats.brute_force,
        stats.xss,
        stats.suspicious_ip,
        stats.automation_tool,
        stats.bot_activity
      ]
    }]
  };

  if (chart) {
    chart.data = data;
    chart.update();
  } else {
    const ctx = document.getElementById("attackChart").getContext("2d");
    chart = new Chart(ctx, {
      type: 'bar',
      data: data
    });
  }
}

setInterval(loadLogs, 2000);
loadLogs();
</script>

</body>
</html>
