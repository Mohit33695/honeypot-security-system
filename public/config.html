<!DOCTYPE html>

  <style>
    body {
      background: #020617;

    }

    }

    .warning {
      margin-top: 20px;

    }

    /* blinking cursor */
    .cursor {
      display: inline-block;
      width: 10px;
      background: #22c55e;
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
